<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#FF5A36" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Poppy" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" href="icons/favicon.png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <title>Poppy</title>

  <!-- Fonts: Fraunces for display headings (playful, organic), Nunito for body (rounded, friendly) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,500;1,9..144,600;1,9..144,700&family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <!-- Tailwind via CDN (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Poppy design tokens — resolved at runtime from CSS custom properties
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            sans:    ['Nunito', '-apple-system', 'system-ui', 'sans-serif'],
          },
          colors: {
            poppy: { 50:'var(--poppy-50)', 100:'var(--poppy-100)', 200:'var(--poppy-200)', 300:'var(--poppy-300)', 400:'var(--poppy-400)', 500:'var(--poppy-500)', 600:'var(--poppy-600)', 700:'var(--poppy-700)', 800:'var(--poppy-800)', 900:'var(--poppy-900)' },
            cream: { 50:'var(--cream-50)', 100:'var(--cream-100)', 200:'var(--cream-200)', 300:'var(--cream-300)', 400:'var(--cream-400)', 500:'var(--cream-500)', 600:'var(--cream-600)', 700:'var(--cream-700)' },
            ink:   { 50:'var(--ink-50)', 100:'var(--ink-100)', 200:'var(--ink-200)', 300:'var(--ink-300)', 400:'var(--ink-400)', 500:'var(--ink-500)', 600:'var(--ink-600)', 700:'var(--ink-700)', 800:'var(--ink-800)', 900:'var(--ink-900)' },
            buttercup: { 50:'var(--buttercup-50)', 100:'var(--buttercup-100)', 200:'var(--buttercup-200)', 300:'var(--buttercup-300)', 400:'var(--buttercup-400)', 500:'var(--buttercup-500)', 600:'var(--buttercup-600)', 700:'var(--buttercup-700)' },
            leaf:  { 50:'var(--leaf-50)', 100:'var(--leaf-100)', 200:'var(--leaf-200)', 300:'var(--leaf-300)', 400:'var(--leaf-400)', 500:'var(--leaf-500)', 600:'var(--leaf-600)', 700:'var(--leaf-700)' },
            petal: { 50:'var(--petal-50)', 100:'var(--petal-100)', 200:'var(--petal-200)', 300:'var(--petal-300)', 400:'var(--petal-400)', 500:'var(--petal-500)', 600:'var(--petal-600)', 700:'var(--petal-700)' },
            sky2:  { 50:'var(--sky2-50)', 100:'var(--sky2-100)', 200:'var(--sky2-200)', 300:'var(--sky2-300)', 400:'var(--sky2-400)', 500:'var(--sky2-500)', 600:'var(--sky2-600)', 700:'var(--sky2-700)' },
            plum:  { 50:'var(--plum-50)', 100:'var(--plum-100)', 200:'var(--plum-200)', 300:'var(--plum-300)', 400:'var(--plum-400)', 500:'var(--plum-500)', 600:'var(--plum-600)', 700:'var(--plum-700)' },
          },
          boxShadow: {
            'poppy':   'var(--shadow-poppy)',
            'card':    'var(--shadow-card)',
            'card-hi': 'var(--shadow-card-hi)',
            'pop':     'var(--shadow-pop)',
          },
          borderRadius: {
            'xl2': '1.125rem',
            '4xl': '2rem',
            '5xl': '2.5rem',
          },
        }
      }
    };
  </script>

  <style>
    /* ── Spring (default) ── */
    :root {
      --poppy-50:#FFF1EB;  --poppy-100:#FFE0D2; --poppy-200:#FFC2A8; --poppy-300:#FF9C77; --poppy-400:#FF7A50;
      --poppy-500:#FF5A36; --poppy-600:#E63F1A; --poppy-700:#BD2C0E; --poppy-800:#8E210B; --poppy-900:#5F1505;
      --cream-50:#FFFBF6;  --cream-100:#FFF4E8; --cream-200:#FFE7D1; --cream-300:#F3D6BC; --cream-400:#DCBE9F;
      --cream-500:#B89A7C; --cream-600:#8C735A; --cream-700:#5E4B39;
      --ink-50:#FAF5F1;    --ink-100:#EFE2D6;   --ink-200:#D9BFAC;   --ink-300:#B89784;   --ink-400:#8F7060;
      --ink-500:#6B5142;   --ink-600:#4B3829;   --ink-700:#36281B;   --ink-800:#241A11;   --ink-900:#150E08;
      --buttercup-50:#FFFBEA; --buttercup-100:#FFF3C4; --buttercup-200:#FCE588; --buttercup-300:#FADB5F;
      --buttercup-400:#F7C948; --buttercup-500:#F0B429; --buttercup-600:#DE911D; --buttercup-700:#CB6E17;
      --leaf-50:#EFFCEF;   --leaf-100:#D2F5D5;  --leaf-200:#A8E9B0;  --leaf-300:#7DDB89;
      --leaf-400:#5BC76A;  --leaf-500:#3FB04F;  --leaf-600:#2E8C3D;  --leaf-700:#236B2F;
      --petal-50:#FFF0F5;  --petal-100:#FFD9E6; --petal-200:#FFB1CB; --petal-300:#FF85AC;
      --petal-400:#FB628F; --petal-500:#EC4778; --petal-600:#C4305F; --petal-700:#962347;
      --sky2-50:#EBF6FB;   --sky2-100:#CCE7F4;  --sky2-200:#9CCFE9;  --sky2-300:#6DB6DC;
      --sky2-400:#469CCB;  --sky2-500:#2882B7;  --sky2-600:#1E6594;  --sky2-700:#164D72;
      --plum-50:#F4EEFB;   --plum-100:#E1D2F4;  --plum-200:#C5A8E8;  --plum-300:#A881D8;
      --plum-400:#8D60C5;  --plum-500:#7344AB;  --plum-600:#583389;  --plum-700:#3F2566;
      --shadow-poppy: 0 12px 32px -12px rgba(255,90,54,0.45);
      --shadow-card:  0 4px 16px -6px rgba(94,21,5,0.10);
      --shadow-card-hi: 0 18px 36px -16px rgba(94,21,5,0.20);
      --shadow-pop:   0 8px 24px -8px rgba(94,21,5,0.18);
      --wash: radial-gradient(circle at 90% -10%, rgba(255,90,54,0.10), transparent 40%),
              radial-gradient(circle at -10% 110%, rgba(247,201,72,0.10), transparent 45%);
    }
    /* ── Winter ── */
    [data-theme="winter"] {
      --poppy-50:#FFEBED;  --poppy-100:#FFCBD3; --poppy-200:#FF98A7; --poppy-300:#FF6175; --poppy-400:#F02F4A;
      --poppy-500:#D71029; --poppy-600:#B0061D; --poppy-700:#870315; --poppy-800:#5E020F; --poppy-900:#38010A;
      --cream-50:#F7FAFC;  --cream-100:#ECF1F7; --cream-200:#DAE2EC; --cream-300:#C2CCDA; --cream-400:#A1ACBE;
      --cream-500:#7E8A9D; --cream-600:#5C6678; --cream-700:#404856;
      --ink-50:#F2F5F8;    --ink-100:#DCE3EB;   --ink-200:#B5C2D0;   --ink-300:#8C9DAF;   --ink-400:#677A8E;
      --ink-500:#4A5C70;   --ink-600:#344256;   --ink-700:#232E3F;   --ink-800:#161E2B;   --ink-900:#0A0F1A;
      --buttercup-50:#FFF8DD; --buttercup-100:#FFEEA8; --buttercup-200:#FFE070; --buttercup-300:#FFD13F;
      --buttercup-400:#FCC117; --buttercup-500:#E5A700; --buttercup-600:#B98300; --buttercup-700:#8C6300;
      --leaf-50:#E5FBEC;   --leaf-100:#BDF3CF;  --leaf-200:#84E5AA;  --leaf-300:#4DD487;
      --leaf-400:#21BF67;  --leaf-500:#00A14F;  --leaf-600:#007D3D;  --leaf-700:#005D2E;
      --petal-50:#FFEBF4;  --petal-100:#FFC8E3; --petal-200:#FF93CB; --petal-300:#FF5DB2;
      --petal-400:#F12A97; --petal-500:#D80D7F; --petal-600:#AD0763; --petal-700:#800448;
      --sky2-50:#E5F2FF;   --sky2-100:#B7DCFF;  --sky2-200:#7CC0FF;  --sky2-300:#44A4FF;
      --sky2-400:#0E89FA;  --sky2-500:#006AD1;  --sky2-600:#0052A4;  --sky2-700:#003C77;
      --plum-50:#F0E8FF;   --plum-100:#D6C2FF;  --plum-200:#B391FF;  --plum-300:#905CFF;
      --plum-400:#6F2EFE;  --plum-500:#5610E2;  --plum-600:#4308B5;  --plum-700:#320588;
      --shadow-poppy: 0 12px 32px -12px rgba(215,16,41,0.40);
      --shadow-card:  0 4px 16px -6px rgba(20,30,43,0.10);
      --shadow-card-hi: 0 18px 36px -16px rgba(20,30,43,0.22);
      --shadow-pop:   0 8px 24px -8px rgba(20,30,43,0.18);
      --wash: linear-gradient(160deg, #ECF1F7 0%, #F7FAFC 100%);
    }

    html, body, #root { height: 100%; margin: 0; padding: 0; background: var(--cream-50); }
    body { font-family: 'Nunito', -apple-system, system-ui, sans-serif; color: var(--ink-800); -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; -webkit-overflow-scrolling: touch; }
    .font-display { font-family: 'Fraunces', Georgia, serif; }

    /* Background wash — driven by CSS variable so it changes with theme */
    .poppy-wash { background-image: var(--wash); }
    .bg-poppy-gradient {
      --tw-gradient-from: var(--cream-100) var(--tw-gradient-from-position);
      --tw-gradient-to: var(--poppy-100) var(--tw-gradient-to-position);
      --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
    }

    [data-theme="winter"] .bg-poppy-gradient {
      --tw-gradient-from: var(--cream-50) var(--tw-gradient-from-position);
      --tw-gradient-to: var(--cream-100) var(--tw-gradient-to-position);
      --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to);
    }


    .item-card { transition: transform .35s cubic-bezier(.2,.7,.2,1), box-shadow .35s; }
    .item-card:hover { transform: translateY(-3px); box-shadow: 0 18px 36px -16px rgba(94, 21, 5, 0.25); }

    @keyframes fade-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-up { animation: fade-up .45s cubic-bezier(.2,.7,.2,1) both; }

    @keyframes bloom { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); } }
    .bloom { animation: bloom .55s cubic-bezier(.34, 1.56, .64, 1) both; }

    /* Safe area insets for notched phones */
    header, footer, main { padding-left: max(env(safe-area-inset-left), 0px); padding-right: max(env(safe-area-inset-right), 0px); }
    header { padding-top: env(safe-area-inset-top); }
    footer { padding-bottom: env(safe-area-inset-bottom); }

    /* Custom scrollbar — peek of poppy */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 90, 54, 0.25); border-radius: 999px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 90, 54, 0.45); }
  </style>
</head>
<script>
  /* Apply saved theme before first paint to avoid flash */
  try { const t = localStorage.getItem('closet:theme'); if (t === 'winter') document.documentElement.dataset.theme = 'winter'; } catch(e) {}
</script>
<body>
  <div id="root">
    <div style="height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--cream-50,#FFFBF6);">
      <div style="width:56px;height:56px;border-radius:50%;background:#FF5A36;display:flex;align-items:center;justify-content:center;animation:bloom .6s cubic-bezier(.34,1.56,.64,1) both;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#FFFBF6" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 21s-7-4.5-7-11a4 4 0 0 1 7-2.65A4 4 0 0 1 19 10c0 6.5-7 11-7 11z" fill="#FFFBF6" stroke="#FF5A36"/>
        </svg>
      </div>
      <div style="font-family:'Nunito',sans-serif;color:#8F7060;font-weight:600;letter-spacing:.2em;text-transform:uppercase;font-size:.7rem;">Loading…</div>
    </div>
  </div>

  <!-- React + Babel for JSX (small app, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Seed data: window.SEED_ITEMS, window.SEED_IMAGES -->
  <script src="seed.js"></script>

  <script type="text/babel" src="app.js"></script>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.warn('SW registration failed', err));
      });
    }
  </script>
</body>
</html>
